name: skypulse
description: AI-Powered Advanced Weather Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.0
  dio_cache_interceptor: ^3.4.4
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  
  # AI & Machine Learning
  google_generative_ai: ^0.4.0
  
  # Voice Features (UPDATED VERSIONS)
  speech_to_text: ^7.0.0  # 6.6.0 සිට 7.0.0 ට
  flutter_tts: ^4.2.0      # 3.8.5 සිට 4.2.0 ට
  
  # UI
  lottie: ^2.7.0
  fl_chart: ^0.65.0
  
  # # Notifications (Commented)
  # firebase_messaging: ^14.7.0
  # firebase_core: ^2.24.0
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Utilities
  intl: ^0.18.0
  share_plus: ^10.1.4    # 7.0.0 සිට 10.1.4 ට
  path_provider: ^2.1.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/animations/sun.json
    - assets/animations/cloud.json
    - assets/animations/few_clouds.json
    - assets/animations/rain.json
    - assets/animations/thunderstorm.json
    - assets/animations/snow.json
    - assets/animations/fog.json
    - assets/animations/storm.json